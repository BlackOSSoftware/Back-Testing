<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | Backtest Desk</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell profile-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark"><i data-lucide="candlestick-chart"></i></div>
          <div>
            <strong>Backtest Desk</strong>
            <span>Personal strategy</span>
          </div>
        </div>
        <nav class="side-nav profile-nav">
          <a href="/"><i data-lucide="layout-dashboard"></i> Dashboard</a>
          <a href="/profile" class="active"><i data-lucide="user-round"></i> Profile</a>
        </nav>
        <div class="side-card developer-card">
          <span>Developed by</span>
          <strong>Black OS</strong>
          <small>Software Solutions</small>
        </div>
      </aside>

      <main class="content profile-content">
        <header class="topbar">
          <div>
            <p>Account</p>
            <h1>Profile</h1>
          </div>
          <div class="top-actions">
            <div class="user-chip">
              <span>Signed in as</span>
              <strong id="signedInUser">...</strong>
            </div>
            <a class="secondary-btn profile-link-btn" href="/">
              <i data-lucide="arrow-left"></i>
              Dashboard
            </a>
            <button id="logoutBtn" class="secondary-btn" type="button">
              <i data-lucide="log-out"></i>
              Log out
            </button>
          </div>
        </header>

        <section class="panel profile-panel">
          <div class="panel-title">
            <div>
              <h2>Account Details</h2>
              <p>Contact information</p>
            </div>
            <span id="profileStatus" class="status-pill">Ready</span>
          </div>
          <form id="profileForm" class="profile-form">
            <label>
              <span>Name</span>
              <input id="profileName" name="name" autocomplete="name" maxlength="80" required />
            </label>
            <label>
              <span>Mobile Number</span>
              <input id="mobileNumber" name="mobile_number" type="tel" autocomplete="tel" maxlength="30" placeholder="+91 98765 43210" />
            </label>
            <label>
              <span>Customer Support Number</span>
              <input id="supportNumber" name="support_number" type="tel" maxlength="30" placeholder="+91 98765 43210" />
            </label>
            <button class="primary-btn profile-save-btn" type="submit">
              <i data-lucide="save"></i>
              Save Profile
            </button>
          </form>
        </section>

        <footer class="profile-footer">Developed by <strong>Black OS Software Solutions</strong></footer>
      </main>
    </div>

    <script>
      let csrfToken = "";

      function setProfileStatus(text, state = "ready") {
        const pill = document.getElementById("profileStatus");
        pill.textContent = text;
        pill.dataset.state = state;
      }

      async function apiJson(url, options = {}) {
        const requestOptions = { ...options, headers: { ...(options.headers || {}) }, credentials: "include" };
        if (csrfToken && requestOptions.method && requestOptions.method !== "GET") {
          requestOptions.headers["X-CSRF-Token"] = csrfToken;
        }
        const response = await fetch(url, requestOptions);
        if (response.status === 401) {
          window.location.href = "/login";
          throw new Error("Session expired.");
        }
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Request failed.");
        return data;
      }

      async function loadProfile() {
        const auth = await apiJson("/api/session");
        csrfToken = auth.csrf_token;
        document.getElementById("signedInUser").textContent = auth.username;
        const profile = await apiJson("/api/profile");
        document.getElementById("profileName").value = profile.name || auth.username;
        document.getElementById("mobileNumber").value = profile.mobile_number || "";
        document.getElementById("supportNumber").value = profile.support_number || "";
      }

      document.getElementById("profileForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        setProfileStatus("Saving...", "loading");
        const values = Object.fromEntries(new FormData(event.currentTarget).entries());
        try {
          await apiJson("/api/profile", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(values),
          });
          setProfileStatus("Saved");
        } catch (error) {
          setProfileStatus(error.message, "error");
        }
      });

      document.getElementById("logoutBtn").addEventListener("click", async () => {
        await fetch("/logout", { method: "POST", headers: { "X-CSRF-Token": csrfToken } });
        window.location.href = "/login";
      });

      loadProfile().catch((error) => setProfileStatus(error.message, "error"));
      if (window.lucide) lucide.createIcons();
    </script>
  </body>
</html>
